<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>挨拶</title>
    <style>
        #box {
            width: 200px;
            height: 200px;
            background: skyblue;
            margin: 100px auto;
            position: relative;
        }

        #msg {
            font-size: 30px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div id="box"></div>

    <div id="msg"></div>

    <script>
        $("#box").mouseenter(function () {
            $("#msg").text("こんにちは");
        });

        $("#box").mouseleave(function () {
            $("#msg").text("");
        });
    </script>
</body>

</html>
